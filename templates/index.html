<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link
      rel="stylesheet"
      href="{{ url_for('static', filename='styles.css') }}"
    />
    <link
      rel="stylesheet"
      href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
      integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
      crossorigin=""
    />
    <!-- Make sure you put this AFTER Leaflet's CSS -->
    <script
      src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
      integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
      crossorigin=""
    ></script>
    <script src="https://cdn.tailwindcss.com"></script>
  </head>
  <body>
    <div>
      <div class="h-screen w-screen" id="map"></div>
      <div
        class="translate-x-full transition-transform duration-300 flex flex-col gap-4 p-4 items-center bg-gray-300 z-[1000] fixed top-0 right-0 h-full w-64"
        id="sidebar"
      >
        <button
          class="absolute -left-8 top-1/2 z-[2000]"
          onClick="toggleSidebar()"
        >
          <img
            id="sidebarImg"
            src="{{ url_for('static', filename='show-sidepanel.png') }}"
          />
        </button>
        <button
          class="bg-blue-500 hover:bg-blue-700 text-white font-bold py-2 px-4 rounded-full"
          onclick="toggleMarker(polygon)"
        >
          Toggle Polygon
        </button>
        <button
          class="bg-blue-500 hover:bg-blue-700 text-white font-bold py-2 px-4 rounded-full"
          onclick="toggleMarker(marker)"
        >
          Toggle Marker
        </button>
        <button
          class="bg-blue-500 hover:bg-blue-700 text-white font-bold py-2 px-4 rounded-full"
          onclick="toggleMarker(line)"
        >
          Toggle Line
        </button>
        <button
          class="bg-red-500 hover:bg-red-700 text-white font-bold py-2 px-4 rounded-full"
          onclick="togglePopup()"
          id="popupButton"
        >
          Toggle Popup
        </button>
        <button
          class="bg-red-500 hover:bg-red-700 text-white font-bold py-2 px-4 rounded-full"
          onclick="locationSidebar()"
          id="popupButton"
        >
          Sidebar Test
        </button>
      </div>
      <div
        id="markerSidebar"
        class="items-center bg-gray-300 z-[2000] fixed top-0 left-0 h-full w-64"
        onClick=""
      >
        <p>Task 2</p>
      </div>
    </div>

    <script src="{{ url_for('static', filename='map.js') }}"></script>
  </body>
</html>
